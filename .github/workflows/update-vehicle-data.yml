name: Update Vehicle Data

on:
  schedule:
    - cron: '0 6 1 1 *'  # Jan 1st at 6am UTC
    - cron: '0 6 1 7 *'  # Jul 1st at 6am UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4                    # develop, provides the script

      - uses: actions/checkout@v4                    # main, receives the commit
        with:
          ref: main
          path: main-checkout

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Rebuild vehicle data into main checkout
        working-directory: main-checkout
        run: node ../scripts/buildVehicleData.ts

      - name: Commit and push to main
        working-directory: main-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/vehicle-data/
          git diff --staged --quiet || git commit -m "chore: update vehicle data for $(date +%Y)"
          git push origin main
